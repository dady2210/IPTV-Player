<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Premium | Stream Player</title>
	<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #334155;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .app-container { 
            display: flex; 
            height: 100vh; 
            width: 100vw;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
            transition: all 0.3s ease;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid #334155; }
        .sidebar-header h2 { font-size: 1.5rem; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        .login-section { padding: 15px; background: rgba(0,0,0,0.2); margin: 10px; border-radius: 12px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 6px 0; 
            border-radius: 8px; 
            border: 1px solid #475569; 
            background: #0f172a; 
            color: white;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        .nav-buttons { 
            padding: 10px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
        }
        
        .btn {
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            background: var(--card-bg);
            color: white;
            transition: 0.2s;
        }
        .btn:hover { background: var(--primary); }
        .btn-primary { background: var(--primary); width: 100%; margin-top: 5px; flex-direction: row; justify-content: center; font-size: 0.9rem;}

        /* --- SEARCH & LIST --- */
        .search-container { 
            padding: 10px 15px; 
            display: flex; 
            gap: 8px; 
            align-items: center; 
        }
        
        .btn-refresh {
            background: var(--card-bg);
            border: 1px solid #475569;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-refresh:hover { background: var(--primary); }

        /* Botón de volver para las series */
        #back-btn-container {
            padding: 0 15px 10px 15px;
            display: none;
        }
        .btn-back {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--text-main);
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-back:hover { background: var(--primary); }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
        }
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .item-card {
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .item-card:hover { background: rgba(99, 102, 241, 0.1); border-color: var(--primary); }
        .item-card img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #000; cursor: pointer; }
        .item-info { flex: 1; overflow: hidden; cursor: pointer; }
        .item-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .heart-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s, color 0.2s;
            padding: 5px;
        }
        .heart-btn.active { color: #ef4444; transform: scale(1.2); }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }

        .player-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .video-info { margin-top: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; width: 100%;}
        .video-info h1 { font-size: 1.8rem; margin-bottom: 10px; color: var(--primary); }
        /* Añadida clase para la descripción */
        .video-desc { color: var(--text-dim); line-height: 1.5; font-size: 0.95rem; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;}

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; height: 50vh; overflow-y: auto; }
            .main-content { height: 50vh; overflow-y: auto; padding: 10px; }
            .player-wrapper { border-radius: 8px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2><i data-lucide="tv"></i> IPTV PRO</h2>
        </div>

        <div class="login-section">
            <input id="server" placeholder="http://servidor.com:8080">
            <input id="username" placeholder="Usuario">
            <input id="password" type="password" placeholder="Contraseña">
            <button class="btn btn-primary" onclick="login()">
                <i data-lucide="log-in" style="width:16px"></i> Conectar
            </button>
        </div>
        
        <button class="btn" id="logout-btn" onclick="logout()" style="display: none; background: #ef4444; color: white; margin: 10px 15px;">
            Cerrar Sesión / Cambiar Cuenta
        </button>

        <nav class="nav-buttons">
            <button class="btn" onclick="loadContent('get_live_streams')">
                <i data-lucide="monitor"></i> En Vivo
            </button>
            <button class="btn" onclick="loadContent('get_vod_streams')">
                <i data-lucide="film"></i> Películas
            </button>
            <button class="btn" onclick="loadContent('get_series')">
                <i data-lucide="clapperboard"></i> Series
            </button>
            <button class="btn" onclick="loadFavorites()">
                <i data-lucide="heart"></i> Favoritos
            </button>
        </nav>

        <div class="search-container" id="search-wrapper">
            <input id="search" placeholder="🔍 Buscar contenido..." oninput="filterList()" style="flex: 1;">
            <button class="btn-refresh" onclick="refreshCurrentList()" title="Actualizar lista">
                <i data-lucide="refresh-cw" style="width: 20px; height: 20px;"></i>
            </button>
        </div>

        <div id="back-btn-container">
            <button class="btn-back" onclick="goBackToList()">
                <i data-lucide="arrow-left" style="width: 16px;"></i> Volver a la lista
            </button>
        </div>

        <div class="list-container" id="list">
        </div>
    </aside>

    <main class="main-content">
        <div class="player-wrapper">
            <video id="video" controls poster="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=1000&auto=format&fit=crop"></video>
        </div>
		<div class="video-info">
			<h1 id="title">Bienvenido</h1>
			<p id="details" style="font-weight: bold; margin-bottom: 5px;"></p>
			<div id="description" class="video-desc">Selecciona un canal, película o serie para comenzar la reproducción.</div>
			
			<div style="margin-top: 15px;">
				<button id="btn-vlc" class="btn" onclick="openInVLC()" style="display: none; background: #ff8c00; color: white; flex-direction: row; width: auto; padding: 10px 20px;">
					<i data-lucide="external-link" style="width: 18px; margin-right: 5px;"></i> Reproducir en VLC (Soluciona Audio)
				</button>
			</div>
		</div>
    </main>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        const creds = JSON.parse(localStorage.getItem('iptv_creds'));
        if (creds) {
            document.getElementById('server').value = creds.server || '';
            document.getElementById('username').value = creds.username || '';
            document.getElementById('password').value = creds.password || '';
            
            document.querySelector('.login-section').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'block';
        }
    });
	let currentVideoUrl = ""; // Guarda la URL para mandarla a VLC
    let dataList = []; // Guarda la lista principal actual
    let currentMode = ''; 
    let isViewingEpisodes = false; // Bandera para saber si estamos dentro de una serie

    function getAuth(){
        return {
            server: document.getElementById('server').value.trim(),
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value.trim()
        }
    }

    function login(){
        const auth = getAuth();
        if(!auth.server || !auth.username) return alert("Completa los datos");
        
        localStorage.setItem('iptv_creds', JSON.stringify(auth));
        
        document.querySelector('.login-section').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'block';
        
        alert("🚀 Conectado con éxito");
    }

    function logout(){
        localStorage.removeItem('iptv_creds');
        localStorage.removeItem('iptv_data_get_live_streams');
        localStorage.removeItem('iptv_data_get_vod_streams');
        localStorage.removeItem('iptv_data_get_series');
        
        document.getElementById('server').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('list').innerHTML = '';
        
        document.querySelector('.login-section').style.display = 'block';
        document.getElementById('logout-btn').style.display = 'none';
    }

    async function loadContent(action, forceRefresh = false){
        const {server, username, password} = getAuth();
        if(!server) return alert("Configura el servidor primero");
        
        // Resetear vistas
        isViewingEpisodes = false;
        document.getElementById('back-btn-container').style.display = 'none';
        document.getElementById('search-wrapper').style.display = 'flex';
        
        currentMode = action;
        const cacheKey = `iptv_data_${action}`; 

        if (!forceRefresh) {
            const cachedData = localStorage.getItem(cacheKey);
            if (cachedData) {
                dataList = JSON.parse(cachedData);
                renderList(dataList);
                return; 
            }
        }

        const url = `${server}/player_api.php?username=${username}&password=${password}&action=${action}`;
        try {
            document.getElementById('list').innerHTML = "<p style='text-align:center; padding: 20px;'>Cargando contenido...</p>";
            
            const res = await fetch(url);
            dataList = await res.json();
            
            try {
                localStorage.setItem(cacheKey, JSON.stringify(dataList));
            } catch (storageError) {
                console.warn("Caché omitido por tamaño.");
            }

            renderList(dataList);
        } catch (e) {
            alert("Error cargando datos.");
            document.getElementById('list').innerHTML = "";
        }
    }

    function refreshCurrentList() {
        if (!currentMode) return alert("Selecciona una categoría primero.");
        if (currentMode === 'favorites') return alert("Los favoritos se actualizan automáticamente.");
        loadContent(currentMode, true);
    }

    // NUEVO: Función para obtener y mostrar episodios de una serie
    async function loadSeriesEpisodes(seriesItem) {
        const {server, username, password} = getAuth();
        const url = `${server}/player_api.php?username=${username}&password=${password}&action=get_series_info&series_id=${seriesItem.series_id}`;

        try {
            document.getElementById('list').innerHTML = "<p style='text-align:center; padding: 20px;'>Cargando episodios...</p>";
            
            const res = await fetch(url);
            const data = await res.json();

            let episodesList = [];
            
            // Extraer episodios de las temporadas (vienen agrupados por número de temporada)
            if (data.episodes) {
                for (const seasonKey in data.episodes) {
                    data.episodes[seasonKey].forEach(ep => {
                        episodesList.push({
                            ...ep,
                            stream_type: 'series_episode', // Etiqueta especial
                            name: `T${seasonKey} E${ep.episode_num || '?'} - ${ep.info?.name || ep.title || 'Episodio'}`,
                            series_name: seriesItem.name, 
                            cover: ep.info?.movie_image || seriesItem.cover,
                            plot: ep.info?.plot || data.info?.plot || "Sin descripción del episodio."
                        });
                    });
                }
            }

            // Cambiar la vista
            isViewingEpisodes = true;
            document.getElementById('search-wrapper').style.display = 'none';
            document.getElementById('back-btn-container').style.display = 'block';

            // Reutilizamos renderList pero le pasamos un flag para ocultar corazones en episodios
            renderList(episodesList, true); 
        } catch (e) {
            alert("Error obteniendo información de la serie.");
            goBackToList();
        }
    }

    // NUEVO: Vuelve a la lista original cacheada
    function goBackToList() {
        isViewingEpisodes = false;
        document.getElementById('search-wrapper').style.display = 'flex';
        document.getElementById('back-btn-container').style.display = 'none';
        
        // Volver a renderizar la lista principal que ya teníamos en memoria
        if (currentMode === 'favorites') {
            loadFavorites();
        } else {
            renderList(dataList);
        }
    }

    function renderList(list, hideHearts = false){
        const container = document.getElementById('list');
        container.innerHTML = "";
        
        const favs = JSON.parse(localStorage.getItem('iptv_favs')) || [];

        list.slice(0, 150).forEach(item => { 
            const div = document.createElement('div');
            div.className = "item-card";
            
            const icon = item.stream_icon || item.cover || 'https://via.placeholder.com/40x40?text=TV';
            
            const id = item.stream_id || item.series_id;
            const isFav = favs.some(f => (f.stream_id || f.series_id) === id);
            
            // Si estamos en episodios, ocultamos el corazón para evitar bugs complejos de guardado de episodios sueltos
            const heartHTML = hideHearts ? '' : `<button class="heart-btn ${isFav ? 'active' : ''}">❤</button>`;

            div.innerHTML = `
                <img src="${icon}" onerror="this.src='https://via.placeholder.com/40x40?text=TV'">
                <div class="item-info">
                    <div class="item-name">${item.name}</div>
                </div>
                ${heartHTML}
            `;

            div.querySelector('.item-info').onclick = () => play(item);
            div.querySelector('img').onclick = () => play(item);
            
            if (!hideHearts) {
                div.querySelector('.heart-btn').onclick = (e) => {
                    e.stopPropagation(); 
                    toggleFav(item, e.target);
                };
            }

            container.appendChild(div);
        });
    }

    function filterList(){
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = dataList.filter(item => 
            item.name.toLowerCase().includes(query)
        );
        renderList(filtered);
    }

    function toggleFav(item, btnElement) {
        let favs = JSON.parse(localStorage.getItem('iptv_favs')) || [];
        const id = item.stream_id || item.series_id;
        
        const index = favs.findIndex(f => (f.stream_id || f.series_id) === id);
        
        if (index > -1) {
            favs.splice(index, 1);
            btnElement.classList.remove('active');
        } else {
            const itemToSave = { ...item, saved_mode: currentMode };
            favs.push(itemToSave);
            btnElement.classList.add('active');
        }
        
        localStorage.setItem('iptv_favs', JSON.stringify(favs));

        if (currentMode === 'favorites') {
            loadFavorites();
        }
    }

    function loadFavorites() {
        isViewingEpisodes = false;
        document.getElementById('back-btn-container').style.display = 'none';
        document.getElementById('search-wrapper').style.display = 'flex';
        
        currentMode = 'favorites';
        dataList = JSON.parse(localStorage.getItem('iptv_favs')) || [];
        renderList(dataList);
    }

    // REPRODUCTOR Y DETALLES ACTUALIZADOS
    function play(item){
        const {server, username, password} = getAuth();
        const video = document.getElementById('video');
        let url = "";

        // Si es una carpeta de serie (desde la lista principal), cargar episodios en lugar de reproducir
        if(item.series_id && item.stream_type !== 'series_episode') {
            loadSeriesEpisodes(item);
            return;
        }

        const modeToUse = item.saved_mode || currentMode;

        // Construir URL según el tipo
        if(item.stream_type === "live" || modeToUse === "get_live_streams"){
            url = `${server}/live/${username}/${password}/${item.stream_id}.m3u8`;
        } else if(item.stream_type === "series_episode") {
            const ext = item.container_extension || "mp4";
            // La URL de episodios de serie usa /series/ no /movie/ ni /live/
            url = `${server}/series/${username}/${password}/${item.stream_id}.${ext}`;
        } else {
            const ext = item.container_extension || "mp4";
            url = `${server}/movie/${username}/${password}/${item.stream_id}.${ext}`;
        }
		currentVideoUrl = url;
        document.getElementById('btn-vlc').style.display = 'inline-flex';
        // TÍTULO Y DESCRIPCIÓN
        document.getElementById('title').textContent = item.series_name ? `${item.series_name} - ${item.name}` : item.name;
        document.getElementById('details').textContent = `Servidor: ${server}`;
        
        // Extraer descripción según cómo la devuelva el proveedor
        const descripcion = item.plot || item.description || (item.info && item.info.plot) || "No hay información o sinopsis disponible para este contenido.";
        document.getElementById('description').textContent = descripcion;

        // Reproducir
        if(Hls.isSupported() && url.includes(".m3u8")){
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    }
	function openInVLC() {
        if (!currentVideoUrl) return;

        // Limpiamos el protocolo de la URL para estructurar el intent
        const cleanUrl = currentVideoUrl.replace(/^https?:\/\//, '');
        const isHttps = currentVideoUrl.startsWith('https');
        const scheme = isHttps ? 'https' : 'http';

        // URL Intent nativa para Android
        // Intenta abrir org.videolan.vlc, si falla, abre la Play Store
        const intentUrl = `intent://${cleanUrl}#Intent;package=org.videolan.vlc;scheme=${scheme};type=video/*;S.browser_fallback_url=market://details?id=org.videolan.vlc;end;`;

        // Ejecutar el enlace
        window.location.href = intentUrl;
    }
</script>

</body>
</html>
